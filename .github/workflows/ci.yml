name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: saas-dashboard

env:
  # Placeholders so `next build` succeeds without real Firebase credentials in CI
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  FIREBASE_ADMIN_PROJECT_ID: ci-placeholder
  FIREBASE_ADMIN_CLIENT_EMAIL: ci@ci-placeholder.iam.gserviceaccount.com
  FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\nCI_PLACEHOLDER\n-----END PRIVATE KEY-----\n"

jobs:
  lint-typecheck-build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: saas-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
